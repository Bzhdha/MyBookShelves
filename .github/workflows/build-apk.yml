# Build Flutter APK via GitHub Actions (sans avoir à builder avec les plugins en local)
# Déclenchement : manuel (workflow_dispatch) ou à chaque push sur main
name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'bd_library_app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bd_library_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ hashFiles('bd_library_app/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('bd_library_app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('bd_library_app/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/bdlibrary.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=app/bdlibrary.jks" >> android/key.properties

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=.debug-info/

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: bd_library_app/build/app/outputs/flutter-apk/*.apk

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: bd_library_app/.debug-info/
