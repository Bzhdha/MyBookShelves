# Build Flutter APK via GitHub Actions (sans avoir à builder avec les plugins en local)
# Déclenchement : manuel (workflow_dispatch) ou à chaque push sur main
name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'bd_library_app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bd_library_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: pub-${{ hashFiles('bd_library_app/pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('bd_library_app/android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('bd_library_app/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: bd_library_app/build/app/outputs/flutter-apk/*.apk
