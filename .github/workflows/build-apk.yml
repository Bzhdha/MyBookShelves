# Build Flutter APK via GitHub Actions (sans avoir à builder avec les plugins en local)
# Déclenchement : manuel (workflow_dispatch) ou à chaque push sur main
name: Build APK

on:
  workflow_dispatch:  # Lancer manuellement depuis l'onglet Actions
  push:
    branches: [main, master]
    paths:
      - 'bd_library_app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bd_library_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Versions
        run: |
          flutter --version
          flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: bd_library_app/build/app/outputs/flutter-apk/*.apk
