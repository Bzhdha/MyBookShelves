org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC
# Évite le bruit « Caught exception: Already watching path: …/android » (VFS Gradle +
# graphe d’inclusion Flutter / plugins). En CI la surveillance apporte peu ; désactivée aussi en local.
org.gradle.vfs.watch=false
android.useAndroidX=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
kotlin.incremental=true
