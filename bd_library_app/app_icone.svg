<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>MyBookShelves — Bibliothèque BD</title>
  <desc>Icône : bulle BD jaune sur fond encre, trois dos de livres (bleu, rouge, crème)</desc>

  <defs>
    <pattern id="halftone" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.8" fill="#2A2520" opacity="0.55"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fond squircle encre (#0D0D0D) -->
  <rect width="1024" height="1024" rx="224" fill="#0D0D0D"/>
  <!-- Texture points vintage subtile -->
  <rect width="1024" height="1024" rx="224" fill="url(#halftone)"/>

  <!-- Bulle BD avec queue (forme combinée) — couleur primaire kYellow #F5C800 -->
  <path d="
    M 250 215
    L 752 215
    Q 826 215 826 289
    L 826 598
    Q 826 672 752 672
    L 410 672
    L 208 806
    L 298 672
    L 250 672
    Q 176 672 176 598
    L 176 289
    Q 176 215 250 215
    Z
  " fill="#F5C800" filter="url(#shadow)"/>

  <!-- Liseré intérieur (effet impression risographe) -->
  <path d="
    M 250 215
    L 752 215
    Q 826 215 826 289
    L 826 598
    Q 826 672 752 672
    L 410 672
    L 208 806
    L 298 672
    L 250 672
    Q 176 672 176 598
    L 176 289
    Q 176 215 250 215
    Z
  " fill="none" stroke="#E8B400" stroke-width="5" opacity="0.45"/>

  <!-- Bordure noire BD (style impression) -->
  <path d="
    M 250 215
    L 752 215
    Q 826 215 826 289
    L 826 598
    Q 826 672 752 672
    L 410 672
    L 208 806
    L 298 672
    L 250 672
    Q 176 672 176 598
    L 176 289
    Q 176 215 250 215
    Z
  " fill="none" stroke="#0D0D0D" stroke-width="14" stroke-linejoin="round"/>

  <!-- ── LIVRES ── baseline commune y=590 ── -->

  <!-- Livre kBlue #1A3A8F (gauche) h=296 → top=294 -->
  <rect x="340" y="294" width="90" height="296" rx="13" fill="#1A3A8F"/>
  <rect x="340" y="294" width="90" height="24"  rx="10" fill="#0F2460"/>
  <rect x="340" y="294" width="90" height="296" rx="13" fill="none" stroke="#0D0D0D" stroke-width="5"/>
  <!-- Lignes titre simulées -->
  <rect x="358" y="352" width="54" height="11" rx="5" fill="#F5F0E8" opacity="0.90"/>
  <rect x="358" y="379" width="38" height="9"  rx="4" fill="#F5F0E8" opacity="0.65"/>
  <rect x="358" y="401" width="46" height="9"  rx="4" fill="#F5F0E8" opacity="0.45"/>
  <!-- Reflet tranche gauche -->
  <rect x="342" y="320" width="5" height="240" rx="2" fill="#FFFFFF" opacity="0.12"/>

  <!-- Livre kRed #E02020 (centre, plus haut) h=326 → top=264 -->
  <rect x="458" y="264" width="90" height="326" rx="13" fill="#E02020"/>
  <rect x="458" y="264" width="90" height="24"  rx="10" fill="#AA1010"/>
  <rect x="458" y="264" width="90" height="326" rx="13" fill="none" stroke="#0D0D0D" stroke-width="5"/>
  <rect x="476" y="322" width="54" height="11" rx="5" fill="#F5F0E8" opacity="0.90"/>
  <rect x="476" y="349" width="38" height="9"  rx="4" fill="#F5F0E8" opacity="0.65"/>
  <rect x="476" y="371" width="46" height="9"  rx="4" fill="#F5F0E8" opacity="0.45"/>
  <rect x="460" y="290" width="5" height="270" rx="2" fill="#FFFFFF" opacity="0.12"/>

  <!-- Livre kPaper #F5F0E8 (droite) h=276 → top=314 -->
  <rect x="576" y="314" width="90" height="276" rx="13" fill="#F5F0E8"/>
  <rect x="576" y="314" width="90" height="24"  rx="10" fill="#DDD8C8"/>
  <rect x="576" y="314" width="90" height="276" rx="13" fill="none" stroke="#0D0D0D" stroke-width="5"/>
  <rect x="594" y="370" width="54" height="11" rx="5" fill="#1A3A8F" opacity="0.80"/>
  <rect x="594" y="397" width="38" height="9"  rx="4" fill="#1A3A8F" opacity="0.60"/>
  <rect x="594" y="419" width="46" height="9"  rx="4" fill="#1A3A8F" opacity="0.40"/>
  <rect x="578" y="340" width="5" height="220" rx="2" fill="#FFFFFF" opacity="0.35"/>
</svg>
